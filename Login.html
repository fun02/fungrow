<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FunGrow AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
  body {
    background: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=1974') no-repeat center center fixed;
    background-size: cover;
    color: white;
    font-family: sans-serif;
  }
  .glass {
    backdrop-filter: blur(16px);
    background: rgba(17, 24, 39, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  .input-box {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid #374151;
    color: white;
  }
</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl">
    <div class="text-center mb-8">
      <div class="mx-auto w-16 h-16 rounded-2xl bg-purple-600 flex items-center justify-center mb-4 shadow-[0_0_20px_rgba(147,51,234,0.5)]">
        <i data-lucide="zap" class="text-white"></i>
      </div>
      <h2 class="text-2xl font-bold">Masuk ke FunGrow AI</h2>
      <p class="text-gray-400 text-sm mt-1">Pilih metode login favoritmu</p>
    </div>

    <div class="flex border-b border-gray-600 mb-6">
      <button onclick="switchTab('email-tab')" class="flex-1 pb-2 border-b-2 border-purple-500 font-semibold" id="btn-email-tab">Email</button>
      <button onclick="switchTab('phone-tab')" class="flex-1 pb-2 text-gray-400" id="btn-phone-tab">Telepon</button>
    </div>

    <div id="email-tab" class="space-y-4">
      <input type="email" id="email" placeholder="Email kamu..." class="w-full input-box rounded-lg p-3 outline-none focus:border-purple-500">
      <input type="password" id="password" placeholder="Password..." class="w-full input-box rounded-lg p-3 outline-none focus:border-purple-500">
      <button onclick="loginEmail()" class="w-full bg-purple-600 hover:bg-purple-700 font-bold py-3 rounded-lg transition-colors">
        Masuk / Daftar
      </button>
    </div>

    <div id="phone-tab" class="space-y-4 hidden">
      <div id="recaptcha-container" class="flex justify-center mb-2"></div>
      
      <div class="flex gap-2" id="phone-input-group">
        <span class="input-box p-3 rounded-lg">+62</span>
        <input type="number" id="phone" placeholder="81234567890" class="w-full input-box rounded-lg p-3 outline-none focus:border-purple-500">
      </div>
      <button onclick="sendOTP()" id="btn-send-otp" class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-3 rounded-lg transition-colors">
        Kirim Kode OTP
      </button>

      <div id="otp-group" class="hidden space-y-4 mt-4">
        <input type="number" id="otp" placeholder="Masukkan 6 digit OTP..." class="w-full input-box rounded-lg p-3 outline-none text-center tracking-widest text-xl">
        <button onclick="verifyOTP()" class="w-full bg-green-600 hover:bg-green-700 font-bold py-3 rounded-lg transition-colors">
          Verifikasi & Masuk
        </button>
      </div>
    </div>

    <div class="my-6 flex items-center">
      <div class="flex-1 border-t border-gray-600"></div>
      <span class="px-3 text-gray-400 text-sm">ATAU</span>
      <div class="flex-1 border-t border-gray-600"></div>
    </div>

    <button onclick="loginGoogle()" class="w-full bg-white text-gray-900 hover:bg-gray-200 font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition-colors">
      <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Lanjutkan dengan Google
    </button>
  </div>

<script>
  lucide.createIcons();

  // CONFIG FIREBASE KAMU
  const firebaseConfig = {
    apiKey: "AIzaSyAOinJglg5eujMZU0NeK7OaXzU3E5-wTXo",
    authDomain: "fungrow-ai-d6c8a.firebaseapp.com",
    projectId: "fungrow-ai-d6c8a",
    storageBucket: "fungrow-ai-d6c8a.firebasestorage.app",
    messagingSenderId: "207957089533",
    appId: "1:207957089533:web:c923637ecd844bcbd93294"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Cek jika sudah login, langsung arahkan ke aplikasi utama
  auth.onAuthStateChanged(user => {
    if(user) {
      window.location.href = "index.html"; 
    }
  });

  function switchTab(tabId) {
    document.getElementById('email-tab').classList.add('hidden');
    document.getElementById('phone-tab').classList.add('hidden');
    document.getElementById(tabId).classList.remove('hidden');
    
    document.getElementById('btn-email-tab').className = "flex-1 pb-2 text-gray-400";
    document.getElementById('btn-phone-tab').className = "flex-1 pb-2 text-gray-400";
    document.getElementById('btn-' + tabId).className = "flex-1 pb-2 border-b-2 border-purple-500 font-semibold text-white";
  }

  function loginGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
      .catch((error) => alert("Gagal: " + error.message));
  }

  function loginEmail() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(!email || !password) return alert("Isi email dan password!");

    auth.signInWithEmailAndPassword(email, password)
      .catch((error) => {
        if(error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
          auth.createUserWithEmailAndPassword(email, password)
            .catch(err => alert("Gagal buat akun: " + err.message));
        } else {
          alert("Error: " + error.message);
        }
      });
  }

  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
    'size': 'normal'
  });

  let confirmationResult;

  function sendOTP() {
    const phoneNumber = "+62" + document.getElementById("phone").value;
    if(phoneNumber.length < 10) return alert("Nomor HP tidak valid");

    const appVerifier = window.recaptchaVerifier;

    auth.signInWithPhoneNumber(phoneNumber, appVerifier)
      .then((result) => {
        confirmationResult = result;
        document.getElementById("phone-input-group").classList.add("hidden");
        document.getElementById("btn-send-otp").classList.add("hidden");
        document.getElementById("recaptcha-container").classList.add("hidden");
        document.getElementById("otp-group").classList.remove("hidden");
        alert("Kode OTP telah dikirim via SMS!");
      }).catch((error) => alert("Gagal kirim SMS: " + error.message));
  }

  function verifyOTP() {
    const code = document.getElementById("otp").value;
    if(code.length !== 6) return alert("OTP harus 6 digit");

    confirmationResult.confirm(code)
      .catch((error) => alert("Kode OTP salah: " + error.message));
  }
</script>
</body>
</html>
